<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="author" content="{{ .Site.Params.author }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  {{ block "head" . }}{{ end }}
</head>
<body>
  <nav class="site-nav">
    <a href="{{ .Site.BaseURL }}" class="nav-home">Two Stories for Anybody</a>
    <div class="nav-links">
      <a href="{{ "sorandom/" | relURL }}">soRandom</a>
      <a href="{{ "pitp/" | relURL }}">Pee in the Pool</a>
    </div>
  </nav>

  <main class="content">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <p>&copy; 2006&ndash;{{ now.Year }} <a href="{{ .Site.Params.licenseURL }}">{{ .Site.Params.license }}</a> &middot; Shawn Rider</p>
  </footer>

  {{ block "scripts" . }}{{ end }}
</body>
</html>
